name: intelligent-ui-spinreader
options:
  bundleIdPrefix: com.tareqismail
  deploymentTarget:
    iOS: 18.1.1
  xcodeVersion: "16.2"
  generateEmptyDirectories: true
  createIntermediateGroups: true

# Load-bearing: xcodegen regenerates project.pbxproj from this file. Removing this
# `packages:` stanza (or its matching `dependencies:` entry below) silently drops the
# OpenAI SPM link and breaks the build with unhelpful linker errors.
packages:
  OpenAI:
    url: https://github.com/MacPaw/OpenAI
    from: 0.3.0
  KokoroSwift:
    url: https://github.com/mlalma/kokoro-ios.git
    from: 1.0.10
  MLXUtilsLibrary:
    url: https://github.com/mlalma/MLXUtilsLibrary.git
    from: 0.0.6
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: 0.29.1

targets:
  Spin:
    type: application
    platform: iOS
    sources: [Spin]
    dependencies:
      - package: OpenAI
      - package: KokoroSwift
        product: KokoroSwift
        embed: true
      - package: MLXUtilsLibrary
      - package: mlx-swift
        product: MLX
      - target: SpinShareExtension
    settings:
      base:
        SWIFT_VERSION: 6.0.3
        ENABLE_TESTABILITY: YES
        DEVELOPMENT_TEAM: 72P6RBSM9C
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.tareqismail.ponder
        CODE_SIGN_ENTITLEMENTS: Spin/Spin.entitlements
    info:
      path: Sources/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UIBackgroundModes:
          - audio
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        CFBundleURLTypes:
          - CFBundleURLName: com.tareqismail.ponder
            CFBundleURLSchemes:
              - spinreader

  SpinShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.1"
    sources:
      - path: SpinShareExtension
        excludes:
          - "*.entitlements"
          - "Info.plist"
    settings:
      base:
        SWIFT_VERSION: 6.0.3
        DEVELOPMENT_TEAM: 72P6RBSM9C
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.tareqismail.ponder.ShareExtension
        CODE_SIGN_ENTITLEMENTS: SpinShareExtension/SpinShareExtension.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Spin Reader
    info:
      path: SpinShareExtension/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleDisplayName: Spin Reader
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1

  SpinTests:
    type: bundle.unit-test
    platform: iOS
    sources: [SpinTests]
    dependencies:
      - target: Spin
    settings:
      base:
        SWIFT_VERSION: 6.0.3
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Spin.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Spin"
        BUNDLE_LOADER: "$(TEST_HOST)"
  SpinUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [SpinUITests]
    dependencies:
      - target: Spin
    settings:
      base:
        SWIFT_VERSION: 6.0.3
        TEST_TARGET_NAME: Spin

schemes:
  Spin:
    build:
      targets:
        Spin: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SpinTests
        - SpinUITests

configs:
  Debug: debug
  Release: release
