name: intelligent-ui-spinreader
options:
  bundleIdPrefix: indivisible.spin
  deploymentTarget:
    iOS: 18.1.1
  xcodeVersion: "16.2"
  generateEmptyDirectories: true
  createIntermediateGroups: true

# Load-bearing: xcodegen regenerates project.pbxproj from this file. Removing this
# `packages:` stanza (or its matching `dependencies:` entry below) silently drops the
# OpenAI SPM link and breaks the build with unhelpful linker errors.
packages:
  OpenAI:
    url: https://github.com/MacPaw/OpenAI
    from: 0.3.0

targets:
  Spin:
    type: application
    platform: iOS
    sources: [Spin]
    dependencies:
      - package: OpenAI
    settings:
      base:
        SWIFT_VERSION: 6.0.3
        ENABLE_TESTABILITY: YES
        DEVELOPMENT_TEAM: 72P6RBSM9C
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true

schemes:
  Spin:
    build:
      targets:
        Spin: all
    run:
      config: Debug

configs:
  Debug: debug
  Release: release